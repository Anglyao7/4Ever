name: four-ever

services:
  backend:
    build:
      context: ..
      dockerfile: python_backend/Dockerfile
    env_file:
      - ./.env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 7778
      DATABASE_URL: sqlite:////data/4ever.db
      MEDIA_ROOT: /data/media
      PRIVATE_MEDIA_ROOT: /data/private-media
    volumes:
      - four_ever_data:/data
    dns:
      - 223.5.5.5
      - 8.8.8.8
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7778/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    dns:
      - 223.5.5.5
      - 8.8.8.8
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  four_ever_data:
  caddy_data:
  caddy_config:
